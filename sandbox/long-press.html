<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Long Press Prototype - Todo Flow</title>
    <style>
        :root {
            --font-interface: 'Inter', sans-serif;
            --font-monospace: 'JetBrains Mono', monospace;
            --background-primary: #1e1e1e;
            --background-secondary: #111;
            --text-normal: #dcddde;
            --text-muted: #888;
            --interactive-accent: #75abd0;
            --background-modifier-border: #333;
            --background-modifier-hover: rgba(255, 255, 255, 0.08);
            --background-modifier-form-field: rgba(0, 0, 0, 0.2);
        }

        body {
            background: var(--background-secondary);
            color: var(--text-normal);
            font-family: var(--font-interface);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
        }

        .mobile-jail {
            width: 360px;
            height: 780px;
            background: var(--background-primary);
            border: 12px solid #222;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        #app {
            height: 100%;
            overflow-y: auto;
            padding: 16px;
            padding-top: 80px;
            /* Leave space for the popover on the first item */
            box-sizing: border-box;
            background: var(--background-primary);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .overlay.active {
            pointer-events: auto;
            opacity: 1;
        }

        .instructions {
            text-align: center;
            max-width: 400px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body class="theme-dark is-mobile">
    <div class="instructions">
        Tap the active task to toggle the long-press menu simulation. Notice how the background dims and the menu pops
        up relative to the card.
    </div>
    <div class="mobile-jail">
        <div id="overlay" class="overlay"></div>
        <div id="app"></div>
    </div>
    <script type="module" src="./menu-prototype.ts"></script>
</body>

</html>
