<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detailed Modal - Todo Flow</title>
    <style>
        :root {
            --font-interface: 'Inter', sans-serif;
            --font-monospace: 'JetBrains Mono', monospace;
            --background-primary: #1e1e1e;
            --background-secondary: #111;
            --text-normal: #dcddde;
            --interactive-accent: #75abd0;
        }

        body {
            background: var(--background-secondary);
            color: var(--text-normal);
            font-family: var(--font-interface);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .mobile-jail {
            width: 360px;
            height: 780px;
            background: var(--background-primary);
            border: 12px solid #222;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            transition: height 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-jail.keyboard-active {
            height: 400px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: #444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body class="theme-dark is-mobile">
    <div class="controls">
        <button class="control-btn" onclick="toggleKeyboard()">⌨ Toggle Keyboard</button>
    </div>
    <div class="mobile-jail" id="jail">
        <div id="app"></div>
    </div>
    <script>
        function toggleKeyboard() {
            document.getElementById('jail').classList.toggle('keyboard-active');
        }
    </script>
    <script type="module" src="./detailed.ts"></script>
</body>

</html>
