<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Flow Sandbox</title>
    <style>
      body { 
        margin: 0; 
        background: #111; 
        color: #fff; 
        font-family: var(--font-interface, sans-serif); 
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #mobile-frame {
        width: 360px;
        height: 780px;
        background: #1e1e1e;
        border: 8px solid #333;
        border-radius: 32px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      }
      #app { height: 100%; border-radius: 24px; overflow: hidden; }
      /* Mock Obsidian classes */
      .theme-dark { color-scheme: dark; }
    </style>
  </head>
  <body class="theme-dark">
    <div id="mobile-frame">
      <div id="app"></div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
