<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High-Density Lean Card - Isolated</title>
    <style>
        :root {
            --font-interface: 'Inter', sans-serif;
            --font-monospace: 'JetBrains Mono', monospace;
            --background-primary: #1e1e1e;
            --background-secondary: #111;
            --text-normal: #dcddde;
            --interactive-accent: #75abd0;
        }

        body {
            background: var(--background-secondary);
            color: var(--text-normal);
            font-family: var(--font-interface);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mobile-jail {
            width: 360px;
            height: 780px;
            background: var(--background-primary);
            border: 12px solid #222;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        #app {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }

        /* High-Density Lean Card Overrides (Sleek Mono-Row) - Injected specifically for isolation */
        .todo-flow-task-card {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            gap: 12px !important;
            padding: 0 16px !important;
            height: 56px !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            margin-bottom: 8px !important;
            /* spacing between cards */
        }

        .time-col {
            flex: 0 0 auto !important;
            font-family: var(--font-monospace) !important;
            font-weight: 700 !important;
            font-size: 0.95rem !important;
            color: var(--text-muted) !important;
            padding: 0 !important;
            background: transparent !important;
            border: none !important;
        }

        .duration-text {
            flex: 0 0 auto !important;
            font-family: var(--font-monospace) !important;
            color: var(--text-muted) !important;
            background: rgba(255, 255, 255, 0.08) !important;
            padding: 4px 10px !important;
            border-radius: 12px !important;
            font-size: 0.85em !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            cursor: pointer !important;
            margin: 0 !important;
        }

        .title-row {
            flex: 1 1 auto !important;
            width: auto !important;
            overflow: hidden !important;
            display: flex !important;
            align-items: center !important;
            margin: 0 !important;
        }

        .title {
            width: 100% !important;
            text-align: left !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
            white-space: nowrap !important;
            background: none !important;
            border: none !important;
            color: var(--text-normal) !important;
            font-size: 1rem !important;
            font-weight: 500 !important;
            padding: 0 !important;
            cursor: pointer !important;
            margin: 0 !important;
        }

        /* States */
        .todo-flow-task-card.is-done .title,
        .todo-flow-task-card.is-done .time-col,
        .todo-flow-task-card.is-done .duration-text {
            opacity: 0.5 !important;
        }

        .todo-flow-task-card.is-done .title {
            text-decoration: line-through !important;
        }

        .todo-flow-task-card.is-focused {
            background: rgba(117, 171, 208, 0.15) !important;
            border: 1px solid var(--interactive-accent) !important;
        }

        .todo-flow-task-card.anchored {
            border-left: 3px solid var(--interactive-accent) !important;
            background: rgba(255, 255, 255, 0.03) !important;
        }
    </style>
</head>

<body class="theme-dark is-mobile">
    <div class="mobile-jail">
        <div id="app"></div>
    </div>
    <script type="module" src="./lean-card-isolated.ts"></script>
</body>

</html>
