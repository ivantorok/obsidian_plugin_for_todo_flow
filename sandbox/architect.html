<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Architect List - Todo Flow</title>
    <style>
        :root {
            --font-interface: 'Inter', sans-serif;
            --font-monospace: 'JetBrains Mono', monospace;
            --background-primary: #1e1e1e;
            --background-secondary: #111;
            --text-normal: #dcddde;
            --interactive-accent: #75abd0;
        }

        body {
            background: var(--background-secondary);
            color: var(--text-normal);
            font-family: var(--font-interface);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mobile-jail {
            width: 360px;
            height: 780px;
            background: var(--background-primary);
            border: 12px solid #222;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        #app {
            height: 100%;
            overflow-y: auto;
        }
    </style>
</head>

<body class="theme-dark is-mobile">
    <div class="mobile-jail">
        <div id="app"></div>
    </div>
    <script type="module" src="./architect.ts"></script>
</body>

</html>
